version: "3.9"

services:

  postgres:

    image: postgres:17

    container_name: personal-finance-postgres

    restart: unless-stopped

    ports:
      - "5432:5432"

    environment:
      POSTGRES_DB: personal_finance

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:

  postgres_data: